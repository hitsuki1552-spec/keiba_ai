<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>競馬予想トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #e0dbd0;
  --text: #1a1713;
  --muted: #6b6560;
  --hint: #9e9890;
  --accent: #c8a84b;
  --win: #2d6a4f;
  --win-bg: #d8f3e8;
  --place: #1a4f8a;
  --place-bg: #dceeff;
  --lose: #8a1a1a;
  --lose-bg: #fde8e8;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; min-height: 100vh; }

.header { background: var(--text); color: white; padding: 14px 16px 12px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; }
.header p { font-size: 11px; color: #aaa; margin-top: 1px; }

.nav { display: flex; flex-wrap: wrap; background: var(--text); padding: 0 16px 12px; gap: 8px; }
.nav-btn { flex: 1; min-width: calc(33% - 8px); padding: 10px 0; border-radius: var(--radius-sm); border: none; font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.nav-btn.active { background: var(--accent); color: var(--text); }
.nav-btn:not(.active) { background: #2a2520; color: #888; }

.content { padding: 16px; max-width: 640px; margin: 0 auto; }
.section { display: none; }
.section.active { display: block; }

.card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; }
.card-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }

.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; color: var(--muted); font-weight: 500; }
.inp {
  padding: 11px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 16px; color: var(--text); background: var(--surface);
  width: 100%; -webkit-appearance: none; transition: border-color 0.15s;
}
.inp:focus { outline: none; border-color: var(--accent); }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Horse card */
.horse-card {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 12px; margin-bottom: 8px; position: relative;
  border: 1.5px solid transparent; transition: border-color 0.15s, background 0.15s;
}
.horse-card.st-win   { border-color: #b8860b; background: #fdf8e6; }
.horse-card.st-2nd  { border-color: var(--place); background: #f0f6ff; }
.horse-card.st-3rd  { border-color: #2d6a4f; background: #f0faf5; }
.horse-card.st-lose { border-color: #ccc; opacity: 0.65; }

/* row layout inside horse card */
.horse-main { display: grid; grid-template-columns: 80px 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
.horse-sub  { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: end; }

.hit-badge {
  display: none; position: absolute; top: 8px; right: 44px;
  padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 700;
}
.horse-card.st-win  .hit-badge { display: inline-block; background: #fef3c7; color: #92600a; }
.horse-card.st-2nd  .hit-badge { display: inline-block; background: var(--place-bg); color: var(--place); }
.horse-card.st-3rd  .hit-badge { display: inline-block; background: var(--win-bg); color: var(--win); }
.horse-card.st-lose .hit-badge { display: inline-block; background: #f0f0f0; color: #999; }

.remove-btn { background: none; border: none; font-size: 22px; color: #ccc; cursor: pointer; padding: 0; line-height: 1; touch-action: manipulation; }
.remove-btn:active { color: var(--lose); }

/* Rank input highlight */
.rank-inp { text-align: center; font-weight: 700; }
.rank-inp.rank-1 { border-color: #b8860b !important; background: #fef3c7 !important; color: #92600a !important; }
.rank-inp.rank-2 { border-color: var(--place) !important; background: var(--place-bg) !important; color: var(--place) !important; }
.rank-inp.rank-3 { border-color: var(--win) !important; background: var(--win-bg) !important; color: var(--win) !important; }
.rank-inp.rank-out { border-color: #ccc !important; background: #f5f5f5 !important; color: #999 !important; }

/* Buttons */
.btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 14px 20px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); font-family: inherit; font-size: 15px; font-weight: 500; cursor: pointer; touch-action: manipulation; transition: all 0.15s; }
.btn-primary { background: var(--text); color: white; border-color: var(--text); }
.btn-secondary { background: var(--surface); color: var(--text); }
.btn-danger { color: var(--lose); border-color: #fdd; background: var(--surface); }
.btn-small { padding: 8px 14px; font-size: 13px; }
.btn-add { background: var(--surface2); border: 1.5px dashed var(--border); color: var(--muted); width: 100%; margin-top: 4px; }
.btn-row { display: flex; gap: 10px; margin-top: 4px; }
.btn-row .btn-primary { flex: 1; }

.msg { font-size: 13px; color: var(--muted); padding: 6px 0; min-height: 24px; }
.msg.success { color: var(--win); }
.msg.error { color: var(--lose); }

/* History */
.hist-item { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 14px 10px; margin-bottom: 10px; }
.hist-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.hist-race { font-size: 15px; font-weight: 700; }
.hist-meta { font-size: 11px; color: var(--hint); margin-top: 2px; }
.hist-actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: 8px; }
.hist-horses { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
.hist-horse { display: flex; align-items: center; gap: 8px; font-size: 14px; }
.hist-horse .odds-txt { font-size: 12px; color: var(--hint); }
.hist-horse .rank-txt { font-size: 12px; color: var(--hint); margin-left: auto; margin-right: 4px; }
.oshi-chip { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.oshi-hon { background: #dbe8ff; color: #1a4f8a; }
.oshi-tai { background: #ffe8d6; color: #8a4a00; }
.oshi-tan { background: #dffde8; color: #1a6b3a; }
.oshi-ren { background: #fdf8d6; color: #7a6800; }
.oshi-ana { background: #fde8f5; color: #8a1a6a; }
.hit-chip { padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.chip-1st   { background: #fef3c7; color: #92600a; }
.chip-2nd   { background: var(--place-bg); color: var(--place); }
.chip-3rd   { background: var(--win-bg);   color: var(--win);   }
.chip-lose  { background: #f0f0f0; color: #999; }
.hist-summary { font-size: 12px; color: var(--muted); background: var(--surface2); border-radius: 6px; padding: 6px 10px; }
.no-result { font-size: 12px; color: var(--hint); }

/* Stats */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px; }
.stat-card .lbl { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 0.05em; margin-bottom: 4px; }
.stat-card .val { font-size: 26px; font-weight: 700; color: var(--text); }
.stat-card .sub { font-size: 11px; color: var(--hint); margin-top: 2px; }
.oshi-stat-list { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px; }
.oshi-stat-row { display: flex; align-items: center; gap: 12px; padding: 14px; border-bottom: 1px solid var(--border); }
.oshi-stat-row:last-child { border-bottom: none; }
.oshi-stat-info { flex: 1; }
.oshi-stat-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.oshi-stat-sub { font-size: 12px; color: var(--hint); }
.oshi-roi { text-align: right; }
.oshi-roi .roi-val { font-size: 22px; font-weight: 700; }
.oshi-roi .roi-lbl { font-size: 11px; color: var(--hint); }
.roi-good { color: #c0392b; }
.roi-mid  { color: #8a6c00; }
.roi-bad  { color: #1a4f8a; }
.roi-none { color: var(--hint); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--hint); font-size: 14px; }

/* Stats section headers */
.stat-section-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin: 18px 0 8px; }

/* Grouped oshi table: used by both lowodds and course sections */
.group-block { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px; }
.group-header { background: var(--surface2); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.group-header-name { font-size: 14px; font-weight: 700; }
.group-header-roi { font-size: 16px; font-weight: 700; }
.group-header-sub { font-size: 11px; color: var(--hint); margin-top: 1px; text-align: right; }
.group-oshi-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.group-oshi-row:last-child { border-bottom: none; }
.group-oshi-info { flex: 1; font-size: 12px; color: var(--hint); }
.group-oshi-roi { text-align: right; font-size: 15px; font-weight: 700; min-width: 52px; }

/* Sort buttons */
.sort-btn { padding: 6px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; background: var(--surface); color: var(--muted); touch-action: manipulation; transition: all 0.15s; }
.sort-btn.active { background: var(--text); color: white; border-color: var(--text); }

/* Oshi filter buttons */
.oshi-filter-btn { display:inline-flex; align-items:center; justify-content:center; padding: 5px 10px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; touch-action: manipulation; transition: all 0.15s; font-size:13px; color:var(--muted); font-family:inherit; }
.oshi-filter-btn.active { border-color: var(--text); background: var(--surface2); }
.oshi-filter-btn[data-oshi].active { border-width: 2px; }

/* Race status grid */
.race-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
.race-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: var(--radius-sm); padding: 5px 2px; font-size: 11px; font-weight: 700; min-height: 44px; border: 1.5px solid; cursor: default; }
.race-cell.done { background: #dffde8; border-color: #1a6b3a; color: #1a6b3a; }
.race-cell.empty { background: var(--surface2); border-color: var(--border); color: var(--hint); }
.race-cell .race-name { font-size: 10px; font-weight: 400; margin-top: 2px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }

/* Group header for sorted sections */
.hist-group-header { font-size: 13px; font-weight: 700; color: var(--muted); padding: 6px 4px 8px; margin-top: 12px; border-bottom: 1.5px solid var(--border); margin-bottom: 8px; letter-spacing: 0.04em; }
.hist-group-header:first-child { margin-top: 0; }
</style>
</head>
<body>

<div class="header">
  <h1>🏇 競馬予想トラッカー</h1>
  <p>AI予想の印別 的中率・回収率を集計</p>
</div>
<div class="nav">
  <button class="nav-btn active" onclick="showTab('input',this)">予想入力</button>
  <button class="nav-btn" onclick="showTab('history',this)">履歴</button>
  <button class="nav-btn" onclick="showTab('stats',this)">集計</button>
  <button class="nav-btn" onclick="showTab('datemonth',this)">日付/月別</button>
  <button class="nav-btn" onclick="showTab('urencombo',this)">馬連集計</button>
  <button class="nav-btn" onclick="showTab('sanrenpuku',this)">3連複</button>
</div>

<div class="content">

  <!-- INPUT TAB -->
  <div id="tab-input" class="section active">

    <div id="edit-banner" style="display:none;background:#fff8e6;border:1px solid #e8d090;border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;font-size:13px;color:#7a5c00;">
      ✏️ 編集中: <span id="edit-race-name"></span>
    </div>

    <div class="card">
      <div class="card-title">レース情報</div>
      <div class="grid2" style="margin-bottom:10px">
        <div class="field"><label>日付</label><input type="date" id="f-date" class="inp"></div>
        <div class="field"><label>競馬場</label>
          <select id="f-course" class="inp">
            <option value="">選択</option>
            <optgroup label="中央">
              <option value="札幌">札幌</option>
              <option value="函館">函館</option>
              <option value="福島">福島</option>
              <option value="新潟">新潟</option>
              <option value="東京">東京</option>
              <option value="中山">中山</option>
              <option value="中京">中京</option>
              <option value="京都">京都</option>
              <option value="阪神">阪神</option>
              <option value="小倉">小倉</option>
            </optgroup>
            <optgroup label="その他">
              <option value="地方">地方</option>
              <option value="海外">海外</option>
            </optgroup>
          </select>
        </div>
      </div>
      <div class="grid2" style="margin-bottom:10px">
        <div class="field"><label>グレード</label>
          <select id="f-grade" class="inp" onchange="autoFillRaceName(this.value)">
            <option value="">選択</option>
            <option value="G1">G1</option>
            <option value="G2">G2</option>
            <option value="G3">G3</option>
            <option value="OP">OP</option>
            <option value="L">L</option>
            <option value="3勝">3勝</option>
            <option value="2勝">2勝</option>
            <option value="1勝">1勝</option>
            <option value="未勝利">未勝利</option>
            <option value="新馬">新馬</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="field"><label>レース番号</label>
          <select id="f-rno" class="inp" onchange="document.getElementById('f-race').value=''">
            <option value="">選択</option>
            <option value="1R">1R</option>
            <option value="2R">2R</option>
            <option value="3R">3R</option>
            <option value="4R">4R</option>
            <option value="5R">5R</option>
            <option value="6R">6R</option>
            <option value="7R">7R</option>
            <option value="8R">8R</option>
            <option value="9R">9R</option>
            <option value="10R">10R</option>
            <option value="11R">11R</option>
            <option value="12R">12R</option>
          </select>
        </div>
      </div>
      <div class="field"><label>レース名</label><input type="text" id="f-race" placeholder="スプリングS" class="inp"></div>
    </div>

    <div class="card">
      <div class="card-title">
        印・馬情報
        <span style="font-size:11px;color:var(--hint);text-transform:none;letter-spacing:0;font-weight:400"> — 着順入力で自動判定</span>
      </div>
      <div id="horse-list"></div>
    </div>

    <div class="card">
      <div class="card-title">配当入力</div>
      <div class="grid2">
        <div class="field">
          <label>馬連配当（円）</label>
          <input type="text" id="f-uren" placeholder="1500" class="inp" inputmode="numeric">
        </div>
        <div class="field">
          <label>3連複配当（円）</label>
          <input type="text" id="f-sanfuku" placeholder="8000" class="inp" inputmode="numeric">
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveRecord()">💾 保存する</button>
      <button class="btn btn-secondary" onclick="clearForm()">クリア</button>
    </div>
    <div class="msg" id="save-msg"></div>
  </div>

  <!-- HISTORY TAB -->
  <div id="tab-history" class="section">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center">
      <span style="font-size:12px;color:var(--muted);font-weight:500">ソート：</span>
      <button class="sort-btn active" onclick="setSort('date',this)">日付順</button>
      <button class="sort-btn" onclick="setSort('course',this)">競馬場別</button>
      <button class="sort-btn" onclick="setSort('month',this)">月別</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
      <input type="date" id="hist-date-filter" class="inp" style="flex:1;font-size:15px;padding:9px 12px" oninput="renderHistory()">
      <button class="sort-btn" onclick="document.getElementById('hist-date-filter').value='';document.getElementById('hist-course-filter').value='';renderHistory()" style="white-space:nowrap;flex-shrink:0">全表示</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
      <select id="hist-course-filter" class="inp" style="flex:1;font-size:15px;padding:9px 12px" onchange="renderHistory()">
        <option value="">競馬場を選択</option>
        <optgroup label="中央">
          <option value="札幌">札幌</option>
          <option value="函館">函館</option>
          <option value="福島">福島</option>
          <option value="新潟">新潟</option>
          <option value="東京">東京</option>
          <option value="中山">中山</option>
          <option value="中京">中京</option>
          <option value="京都">京都</option>
          <option value="阪神">阪神</option>
          <option value="小倉">小倉</option>
        </optgroup>
        <optgroup label="その他">
          <option value="地方">地方</option>
          <option value="海外">海外</option>
        </optgroup>
      </select>
    </div>
    <div id="race-grid" style="margin-bottom:12px"></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
      <span style="font-size:12px;color:var(--muted);font-weight:500">的中印：</span>
      <button class="oshi-filter-btn active" onclick="setOshiFilter(null,this)">全て</button>
      <button class="oshi-filter-btn" data-oshi="◎" onclick="setOshiFilter('◎',this)"><span class="oshi-chip oshi-hon" style="width:22px;height:22px;font-size:12px">◎</span></button>
      <button class="oshi-filter-btn" data-oshi="○" onclick="setOshiFilter('○',this)"><span class="oshi-chip oshi-tai" style="width:22px;height:22px;font-size:12px">○</span></button>
      <button class="oshi-filter-btn" data-oshi="▲" onclick="setOshiFilter('▲',this)"><span class="oshi-chip oshi-tan" style="width:22px;height:22px;font-size:12px">▲</span></button>
      <button class="oshi-filter-btn" data-oshi="△" onclick="setOshiFilter('△',this)"><span class="oshi-chip oshi-ren" style="width:22px;height:22px;font-size:12px">△</span></button>
      <button class="oshi-filter-btn" data-oshi="☆" onclick="setOshiFilter('☆',this)"><span class="oshi-chip oshi-ana" style="width:22px;height:22px;font-size:12px">☆</span></button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
      <span style="font-size:12px;color:var(--muted);font-weight:500">着順：</span>
      <button class="oshi-filter-btn" id="rank-filter-off" onclick="setOshiRankFilter(null,this)">OFF</button>
      <button class="oshi-filter-btn active" id="rank-filter-1" onclick="setOshiRankFilter(1,this)">1着</button>
      <button class="oshi-filter-btn" id="rank-filter-2" onclick="setOshiRankFilter(2,this)">2着</button>
      <button class="oshi-filter-btn" id="rank-filter-3" onclick="setOshiRankFilter(3,this)">3着</button>
      <button class="oshi-filter-btn" id="rank-filter-all" onclick="setOshiRankFilter('all',this)">1〜3着</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;color:var(--muted);font-weight:500">馬連：</span>
      <button class="oshi-filter-btn active" id="uren-filter-all" onclick="setUrenFilter(false,this)">全て</button>
      <button class="oshi-filter-btn" id="uren-filter-hit" onclick="setUrenFilter(true,this)">的中のみ</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;color:var(--muted);font-weight:500">3連複：</span>
      <button class="oshi-filter-btn active" id="sanfuku-filter-all" onclick="setSanfukuFilter(false,this)">全て</button>
      <button class="oshi-filter-btn" id="sanfuku-filter-hit" onclick="setSanfukuFilter(true,this)">的中のみ</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;color:var(--muted);font-weight:500">オッズ帯：</span>
      <button class="oshi-filter-btn active" id="odds-range-all" onclick="setOddsRangeFilter(null,this)">全て</button>
      <button class="oshi-filter-btn" onclick="setOddsRangeFilter('1-5',this)">1〜5倍</button>

<script>
const OSHI = [
  { s:'◎', l:'◎ 本命', cls:'oshi-hon', color:'#1a4f8a' },
  { s:'○', l:'○ 対抗', cls:'oshi-tai', color:'#8a4a00' },
  { s:'▲', l:'▲ 単穴', cls:'oshi-tan', color:'#1a6b3a' },
  { s:'△', l:'△ 連下', cls:'oshi-ren', color:'#7a6800' },
  { s:'☆', l:'☆ 穴',  cls:'oshi-ana', color:'#8a1a6a' },
];

let recs = [];
let editId = null;

try { recs = JSON.parse(localStorage.getItem('kb5') || '[]'); } catch(e) {}
function persist() { try { localStorage.setItem('kb5', JSON.stringify(recs)); } catch(e) {} }

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  OSHI.forEach(o => addHorse(o.s));
});

function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'history')   renderHistory();
  if (id === 'stats')     renderStats();
  if (id === 'datemonth') { renderDateStats(); renderDateUrenFlow(); renderMonthStats(); renderMonthUrenFlow(); renderDateOddsStats(); renderMonthOddsStats(); }
  if (id === 'urencombo') { renderUrenCombo(); }
  if (id === 'sanrenpuku'){ renderSanrenpuku(); }
}

function autoFillRaceName(grade) {
  const map = { '新馬': '新馬戦', '未勝利': '未勝利戦', '1勝': '1勝クラス', '2勝': '2勝クラス', '3勝': '3勝クラス' };
  const auto = map[grade];
  if (!auto) return;
  const el = document.getElementById('f-race');
  if (!el.value) el.value = auto;
}

// ---- HORSE CARD ----
function addHorse(defaultOshi, data) {
  data = data || {};
  const oshi = data.oshi || defaultOshi;
  const wrap = document.getElementById('horse-list');
  const div = document.createElement('div');
  div.className = 'horse-card';
  div.innerHTML = `
    <span class="hit-badge"></span>
    <div class="horse-main">
      <select class="oshi-select inp" style="font-weight:700;font-size:15px;padding:11px 8px"
              onchange="judgeCard(this.closest('.horse-card'))">
        ${OSHI.map(o => `<option value="${o.s}"${o.s===oshi?' selected':''}>${o.l}</option>`).join('')}
      </select>
      <input type="text" placeholder="馬名" class="horse-name inp"
             value="${data.name||''}" oninput="judgeCard(this.closest('.horse-card'))">
    </div>
    <div class="horse-sub" style="grid-template-columns:1fr 1fr 1fr">
      <div class="field">
        <label>オッズ（倍）</label>
        <input type="text" placeholder="2.1"
               class="horse-odds inp" value="${data.odds||''}"
               oninput="judgeCard(this.closest('.horse-card'))">
      </div>
      <div class="field">
        <label>複勝配当（円）</label>
        <input type="text" placeholder="150"
               class="horse-fuku inp" value="${data.fuku||''}">
      </div>
      <div class="field">
        <label>着順</label>
        <input type="text" placeholder="—"
               class="horse-rank inp rank-inp" value="${data.rank||''}"
               oninput="judgeCard(this.closest('.horse-card'))">
      </div>
    </div>`;
  wrap.appendChild(div);
  if (data.rank) judgeCard(div);
}

function judgeCard(card) {
  const rankInp = card.querySelector('.horse-rank');
  const rank = parseInt(rankInp.value);
  const badge = card.querySelector('.hit-badge');

  // Rank input coloring
  rankInp.classList.remove('rank-1', 'rank-2', 'rank-3', 'rank-out');
  if      (rank === 1)                   rankInp.classList.add('rank-1');
  else if (rank === 2)                   rankInp.classList.add('rank-2');
  else if (rank === 3)                   rankInp.classList.add('rank-3');
  else if (rankInp.value)                rankInp.classList.add('rank-out');

  // Card state
  card.classList.remove('st-win', 'st-2nd', 'st-3rd', 'st-lose');
  badge.textContent = '';

  if (!rankInp.value) return;

  if (rank === 1) {
    card.classList.add('st-win');
    const odds = parseFloat(card.querySelector('.horse-odds').value) || 0;
    const fuku = parseFloat(card.querySelector('.horse-fuku').value) || 0;
    badge.textContent = '1着 🥇' + (odds ? '  ＋' + Math.round(odds * 100) + '円' : '') + (fuku ? '  複勝＋' + fuku + '円' : '');
  } else if (rank === 2) {
    card.classList.add('st-2nd');
    const fuku = parseFloat(card.querySelector('.horse-fuku').value) || 0;
    badge.textContent = '2着 🥈' + (fuku ? '  複勝＋' + fuku + '円' : '');
  } else if (rank === 3) {
    card.classList.add('st-3rd');
    const fuku = parseFloat(card.querySelector('.horse-fuku').value) || 0;
    badge.textContent = '3着 🥉' + (fuku ? '  複勝＋' + fuku + '円' : '');
  } else {
    card.classList.add('st-lose');
    badge.textContent = rank + '着';
  }
}

function getHorses() {
  return Array.from(document.querySelectorAll('.horse-card')).map(card => ({
    oshi:  card.querySelector('.oshi-select').value,
    name:  card.querySelector('.horse-name').value.trim(),
    odds:  card.querySelector('.horse-odds').value,
    fuku:  card.querySelector('.horse-fuku').value,
    rank:  card.querySelector('.horse-rank').value,
  })).filter(h => h.name);
}

// ---- SAVE ----
function saveRecord() {
  const race = document.getElementById('f-race').value.trim();
  if (!race) { showMsg('レース名を入力してください', 'error'); return; }
  const horses = getHorses();
  if (!horses.length) { showMsg('馬情報を入力してください', 'error'); return; }

  const date   = document.getElementById('f-date').value;
  const course = document.getElementById('f-course').value;
  const rno    = document.getElementById('f-rno').value;

  // 重複チェック（日付・競馬場・レース番号が同じ既存レコード）
  if (rno) {
    const dup = recs.find(r =>
      Number(r.id) !== Number(editId) &&
      r.date === date &&
      r.course === course &&
      r.rno === rno
    );
    if (dup) {
      showMsg(`⚠️ ${date} ${course} ${rno} はすでに登録されています（${dup.race}）`, 'error');
      return;
    }
  }

  const rec = {
    id: editId || Date.now(),
    date, course,
    grade: document.getElementById('f-grade').value,
    rno, race, horses,
    uren: document.getElementById('f-uren').value,
    sanfuku: document.getElementById('f-sanfuku').value,
  };
  if (editId) { recs = recs.map(r => r.id === editId ? rec : r); }
  else { recs.unshift(rec); }
  persist();
  editId = null;
  document.getElementById('edit-banner').style.display = 'none';
  // 馬リストを◎〇▲△☆の初期状態に戻す
  document.getElementById('horse-list').innerHTML = '';
  OSHI.forEach(o => addHorse(o.s));
  document.getElementById('f-uren').value = '';
  document.getElementById('f-sanfuku').value = '';
  showMsg('✓ 保存しました（' + race + '）', 'success');
}

function clearForm() {
  document.getElementById('horse-list').innerHTML = '';
  OSHI.forEach(o => addHorse(o.s));
  document.getElementById('f-uren').value = '';
  document.getElementById('f-sanfuku').value = '';
  document.getElementById('edit-banner').style.display = 'none';
  editId = null;
  showMsg('');
}

function showMsg(txt, type) {
  const el = document.getElementById('save-msg');
  el.textContent = txt;
  el.className = 'msg' + (type ? ' '+type : '');
}

// ---- HISTORY ----
let histSort = 'date';
let histOshiFilter = null;
let histOshiRank = 1;
let histUrenFilter = false;
let histSanfukuFilter = false;
let histOddsRange = null;

const ODDS_RANGES = {
  '1-5':   { min: 1,  max: 5,        label: '1〜5倍' },
  '5-10':  { min: 5,  max: 10,       label: '5〜10倍' },
  '10-20': { min: 10, max: 20,       label: '10〜20倍' },
  '20-50': { min: 20, max: 50,       label: '20〜50倍' },
  '50-':   { min: 50, max: Infinity, label: '50倍〜' },
};

function setSort(mode, btn) {
  histSort = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderHistory();
}

function setOshiFilter(oshi, btn) {
  histOshiFilter = oshi;
  document.querySelectorAll('.oshi-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // 着順ボタンのアクティブ状態を復元
  const rankId = histOshiRank === null ? 'rank-filter-off' : histOshiRank === 'all' ? 'rank-filter-all' : 'rank-filter-' + histOshiRank;
  const rankBtn = document.getElementById(rankId);
  if (rankBtn) rankBtn.classList.add('active');
  renderHistory();
}

function setOshiRankFilter(rank, btn) {
  histOshiRank = rank;
  document.querySelectorAll('#rank-filter-off,#rank-filter-1,#rank-filter-2,#rank-filter-3,#rank-filter-all').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}

function setSanfukuFilter(hit, btn) {
  histSanfukuFilter = hit;
  document.querySelectorAll('#sanfuku-filter-all, #sanfuku-filter-hit').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}

function setOddsRangeFilter(range, btn) {
  histOddsRange = range;
  document.querySelectorAll('#odds-range-all, .oshi-filter-btn[onclick*="setOddsRangeFilter"]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}

function setUrenFilter(hit, btn) {
  histUrenFilter = hit;
  document.querySelectorAll('#uren-filter-all, #uren-filter-hit').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('hist-list');
  const filterDate = (document.getElementById('hist-date-filter')||{}).value || '';
  const filterCourse = (document.getElementById('hist-course-filter')||{}).value || '';

  // 登録状況グリッド（日付＋競馬場が両方選択時のみ表示）
  const gridEl = document.getElementById('race-grid');
  if (gridEl) {
    if (filterDate && filterCourse) {
      const RNO = ['1R','2R','3R','4R','5R','6R','7R','8R','9R','10R','11R','12R'];
      const dayRecs = recs.filter(r => r.date === filterDate && r.course === filterCourse);
      gridEl.innerHTML =
        `<div style="font-size:12px;color:var(--muted);font-weight:500;margin-bottom:6px">${filterDate.replace(/-/g,'/')} ${filterCourse} の登録状況</div>` +
        '<div class="race-grid">' + RNO.map(rno => {
          const rec = dayRecs.find(r => r.rno === rno);
          if (rec) {
            return `<div class="race-cell done"><span>${rno}</span><span class="race-name">${rec.race}</span></div>`;
          } else {
            return `<div class="race-cell empty"><span>${rno}</span><span class="race-name">未登録</span></div>`;
          }
        }).join('') + '</div>';
    } else if (filterDate && !filterCourse) {
      gridEl.innerHTML = '<div style="font-size:12px;color:var(--hint);padding:2px 0">競馬場を選択すると登録状況を確認できます</div>';
    } else {
      gridEl.innerHTML = '';
    }
  }
  let filtered = recs;
  if (filterDate)   filtered = filtered.filter(r => r.date === filterDate);
  if (filterCourse) filtered = filtered.filter(r => r.course === filterCourse);

  // 印的中フィルター（指定印が指定着順）
  if (histOshiFilter && histOshiRank !== null) {
    filtered = filtered.filter(r =>
      (r.horses||[]).some(h => {
        if (h.oshi !== histOshiFilter) return false;
        if ((h.rank||'').trim() === '除外') return false;
        const rank = parseInt(h.rank);
        if (histOshiRank === 'all') return rank >= 1 && rank <= 3;
        return rank === histOshiRank;
      })
    );
  }

  // オッズ帯フィルター
  if (histOddsRange) {
    const { min, max } = ODDS_RANGES[histOddsRange];
    filtered = filtered.filter(r => {
      const horses = (r.horses||[]).filter(h => (h.rank||'').trim() !== '除外');
      if (histOshiFilter) {
        // 印指定あり：その印の馬のオッズが対象帯
        return horses.some(h => {
          const o = parseFloat(h.odds);
          return h.oshi === histOshiFilter && o >= min && o < max;
        });
      } else {
        // 印指定なし：レース内にそのオッズ帯の馬がいれば表示
        return horses.some(h => {
          const o = parseFloat(h.odds);
          return o >= min && o < max;
        });
      }
    });
  }

  // 馬連的中フィルター
  if (histUrenFilter) {
    filtered = filtered.filter(r => {
      const horses = (r.horses||[]).filter(h => (h.rank||'').trim() !== '除外');
      return horses.some(h => parseInt(h.rank) === 1) &&
             horses.some(h => parseInt(h.rank) === 2);
    });
  }

  // 3連複的中フィルター（1〜3着に印付きの馬が全て揃う）
  if (histSanfukuFilter) {
    filtered = filtered.filter(r => {
      const horses = (r.horses||[]).filter(h => (h.rank||'').trim() !== '除外');
      return horses.some(h => parseInt(h.rank) === 1) &&
             horses.some(h => parseInt(h.rank) === 2) &&
             horses.some(h => parseInt(h.rank) === 3);
    });
  }

  if (!filtered.length) {
    const rankLabel = histOshiRank === null ? '' : histOshiRank === 'all' ? '1〜3着' : histOshiRank + '着';
    const msg = histSanfukuFilter ? '3連複が的中したレースはありません'
      : histUrenFilter ? '馬連が的中したレースはありません'
      : (histOshiFilter && histOshiRank !== null) ? `${histOshiFilter}が${rankLabel}のレースはありません`
      : histOddsRange ? `${ODDS_RANGES[histOddsRange].label}のレースはありません`
      : (filterDate || filterCourse) ? '該当するデータはありません'
      : 'まだデータがありません';
    el.innerHTML = `<div class="empty-state">${msg}</div>`;
    return;
  }

  function recCard(r) {
    const horsesHtml = (r.horses||[]).map(h => {
      const o = OSHI.find(x => x.s === h.oshi) || OSHI[0];
      const rank = parseInt(h.rank);
      const rankTxt = (h.rank || '').trim();
      let chipClass = '', chipTxt = '';
      if (rankTxt === '除外') { chipClass = 'chip-lose'; chipTxt = '除外'; }
      else if (rankTxt) {
        if (rank === 1)      { chipClass = 'chip-1st';  chipTxt = '1着'; }
        else if (rank === 2) { chipClass = 'chip-2nd';  chipTxt = '2着'; }
        else if (rank === 3) { chipClass = 'chip-3rd';  chipTxt = '3着'; }
        else                 { chipClass = 'chip-lose'; chipTxt = rank+'着'; }
      }
      const oddsVal = h.odds && h.odds !== 'undefined' && parseFloat(h.odds) > 0;
      const pay = (rank === 1 && oddsVal) ? '+' + Math.round(parseFloat(h.odds)*100) + '円' : '';
      return `<div class="hist-horse">
        <span class="oshi-chip ${o.cls}">${h.oshi}</span>
        <span>${h.name}</span>
        ${oddsVal ? `<span class="odds-txt">${h.odds}倍</span>` : ''}
        <span class="rank-txt" style="margin-left:auto"></span>
        ${chipClass ? `<span class="hit-chip ${chipClass}">${chipTxt}</span>` : ''}
        ${pay ? `<span style="font-size:12px;color:#c0392b;font-weight:700;margin-left:4px">${pay}</span>` : ''}
      </div>`;
    }).join('');
    const hasResult = (r.horses||[]).some(h => h.rank);
    const winHorse = (r.horses||[]).find(h => parseInt(h.rank)===1);
    // 3連複的中判定
    const horses = (r.horses||[]).filter(h => (h.rank||'').trim() !== '除外');
    const sanfukuHit = horses.some(h=>parseInt(h.rank)===1) && horses.some(h=>parseInt(h.rank)===2) && horses.some(h=>parseInt(h.rank)===3);
    const sanfukuTxt = sanfukuHit && r.sanfuku && r.sanfuku !== 'undefined' && parseFloat(r.sanfuku) > 0 ? `　3連複: ${r.sanfuku}円` : '';
    const summaryTxt = hasResult
      ? (winHorse
          ? `1着: ${winHorse.name}${winHorse.odds && winHorse.odds !== 'undefined' && parseFloat(winHorse.odds) > 0 ? '（'+winHorse.odds+'倍）' : ''}${r.uren && r.uren !== 'undefined' && parseFloat(r.uren) > 0 ? '　馬連: '+r.uren+'円' : ''}${sanfukuTxt}`
          : `結果入力あり（1着なし）${r.uren && r.uren !== 'undefined' && parseFloat(r.uren) > 0 ? '　馬連: '+r.uren+'円' : ''}${sanfukuTxt}`)
      : null;
    return `<div class="hist-item">
      <div class="hist-head"><div>
        <div class="hist-race">${r.race}</div>
        <div class="hist-meta">${[r.date, r.course, r.grade, r.rno].filter(Boolean).join(' ')}</div>
      </div>
      <div class="hist-actions">
        <button class="btn btn-secondary btn-small" onclick="editRec(${r.id})">編集</button>
        <button class="btn btn-danger btn-small" onclick="deleteRec(${r.id});renderHistory()">削除</button>
      </div></div>
      <div class="hist-horses">${horsesHtml}</div>
      ${summaryTxt ? `<div class="hist-summary">${summaryTxt}</div>` : `<div class="no-result">着順未入力</div>`}
    </div>`;
  }

  // レース番号順ソート関数
  const RNO = ['1R','2R','3R','4R','5R','6R','7R','8R','9R','10R','11R','12R'];
  function sortByRno(arr) {
    return [...arr].sort((a, b) => {
      const ai = RNO.indexOf(a.rno), bi = RNO.indexOf(b.rno);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
  }

  if (histSort === 'date') {
    el.innerHTML = sortByRno(filtered).map(recCard).join('');

  } else if (histSort === 'course') {
    const COURSE_ORDER = ['札幌','函館','福島','新潟','東京','中山','中京','京都','阪神','小倉','地方','海外'];
    const groups = {};
    filtered.forEach(r => {
      const key = (r.course || '').trim() || '未設定';
      if (!groups[key]) groups[key] = [];
      groups[key].push(r);
    });
    const keys = Object.keys(groups).sort((a, b) => {
      const ai = COURSE_ORDER.indexOf(a), bi = COURSE_ORDER.indexOf(b);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    el.innerHTML = keys.map(key =>
      `<div class="hist-group-header">🏟 ${key}（${groups[key].length}件）</div>` +
      sortByRno(groups[key]).map(recCard).join('')
    ).join('');

  } else if (histSort === 'month') {
    const groups = {};
    filtered.forEach(r => {
      const key = r.date ? r.date.slice(0, 7) : '日付未設定';
      if (!groups[key]) groups[key] = [];
      groups[key].push(r);
    });
    const keys = Object.keys(groups).sort((a, b) => b.localeCompare(a));
    el.innerHTML = keys.map(key => {
      const label = key.length === 7 ? key.replace('-', '年') + '月' : key;
      return `<div class="hist-group-header">📅 ${label}（${groups[key].length}件）</div>` +
        sortByRno(groups[key]).map(recCard).join('');
    }).join('');
  }
}

function editRec(id) {
  const r = recs.find(x => x.id === id);

  editId = Number(id);
  document.getElementById('f-date').value = r.date || '';
  document.getElementById('f-course').value = r.course || '';

  document.getElementById('f-rno').value = r.rno || '';
  document.getElementById('f-race').value = r.race || '';
  document.getElementById('f-uren').value = r.uren || '';
  document.getElementById('f-sanfuku').value = r.sanfuku || '';

function deleteRec(id) {
  if (!confirm('削除しますか？')) return;
  recs = recs.filter(r => r.id !== id);
  persist();
  renderHistory();
}

// ---- STATS ----
function calcSt(filter) {
  const st = {};
  OSHI.forEach(o => { st[o.s] = { n:0, hit3:0, win:0, tanPay:0, fukuPay:0 }; });
  recs.forEach(r => {
    (r.horses||[]).forEach(h => {
      if (filter && !filter(h, r)) return;
      const s = st[h.oshi]; if (!s) return;
      if ((h.rank || '').trim() === '除外') return;
      const rank = parseInt(h.rank) || 99;
      s.n++;
      if (rank <= 3) {
        s.hit3++;
        s.fukuPay += parseFloat(h.fuku) || 0;
      }
      if (rank === 1) { s.win++; s.tanPay += Math.round((parseFloat(h.odds)||0) * 100); }
    });
  });
  return st;
}

function roiColor(roi) {
  return roi === null ? 'roi-none' : roi >= 100 ? 'roi-good' : roi >= 50 ? 'roi-mid' : 'roi-bad';
}
function roiVal(n, pay) {
  return n > 0 ? Math.round(pay / (n * 100) * 100) : null;
}

// 馬連集計: レース単位。印付き馬に1着と2着の両方がいれば的中
function calcUren() {
  let n = 0, hit = 0, pay = 0;
  recs.forEach(r => {
    const horses = (r.horses||[]).filter(h => (h.rank||'').trim() !== '除外');
    if (horses.length === 0) return;
    n++;
    const has1st = horses.some(h => parseInt(h.rank) === 1);
    const has2nd = horses.some(h => parseInt(h.rank) === 2);
    if (has1st && has2nd) {
      hit++;
      pay += parseFloat(r.uren) || 0;
    }
  });
  return { n, hit, pay };
}

// 馬連 ◎軸流し集計
// partners: 相手印の配列 例 ['○'] ['○','▲'] など
function calcUrenFlow(partners) {
  let n = 0, hit = 0, pay = 0;
  recs.forEach(r => {
    const horses = (r.horses||[]).filter(h => (h.rank||'').trim() !== '除外');
    // ◎の馬が1着か2着にいるか
    const honHit = horses.some(h => h.oshi === '◎' && (parseInt(h.rank) === 1 || parseInt(h.rank) === 2));
    // 相手印のいずれかの馬が1着か2着にいるか
    const partnerHit = horses.some(h => partners.includes(h.oshi) && (parseInt(h.rank) === 1 || parseInt(h.rank) === 2));
    // ◎と相手が両方1・2着に入っているかつ別々の着順
    const rank1horses = horses.filter(h => parseInt(h.rank) === 1);
    const rank2horses = horses.filter(h => parseInt(h.rank) === 2);
    const honIn1or2 = rank1horses.some(h => h.oshi === '◎') || rank2horses.some(h => h.oshi === '◎');
    const partnerIn1or2 = rank1horses.some(h => partners.includes(h.oshi)) || rank2horses.some(h => partners.includes(h.oshi));
    // ◎と相手が同じ着順でないこと（1着と2着に分かれて入っている）
    const urenPay = parseFloat(r.uren) || 0;
    // 対象レースかどうか（◎を持つ馬がいるレースのみ）
    const hasHon = horses.some(h => h.oshi === '◎');
    if (!hasHon) return;
    n++;
    if (honIn1or2 && partnerIn1or2) {
      hit++;
      pay += urenPay;
    }
  });
  return { n, hit, pay };
}

// Build a group-block card with a header (total ROI) + per-oshi rows
function buildGroupBlock(label, sublabel, st) {
  const totN    = OSHI.reduce((a,o) => a+st[o.s].n, 0);
  const totWin  = OSHI.reduce((a,o) => a+st[o.s].win, 0);
  const totPay  = OSHI.reduce((a,o) => a+st[o.s].tanPay, 0);
  const totFuku = OSHI.reduce((a,o) => a+st[o.s].fukuPay, 0);
  const roi     = roiVal(totN, totPay);
  const fukuROI = roiVal(totN, totFuku);
  const rc      = roiColor(roi);
  const frc     = roiColor(fukuROI);
  const wr      = totN > 0 ? Math.round(totWin/totN*100) : 0;

  const rows = OSHI.map(o => {
    const s = st[o.s];
    if (s.n === 0) return '';
    const r   = roiVal(s.n, s.tanPay);
    const fr  = roiVal(s.n, s.fukuPay);
    const rc2 = roiColor(r);
    const frc2= roiColor(fr);
    const w   = s.n > 0 ? Math.round(s.win/s.n*100) : 0;
    const h2  = s.n > 0 ? Math.round(s.hit3/s.n*100) : 0;
    return `<div class="group-oshi-row">
      <span class="oshi-chip ${o.cls}">${o.s}</span>
      <div class="group-oshi-info">${s.n}回　単勝${s.win}回(${w}%)　複勝${s.hit3}回(${h2}%)</div>
      <div style="text-align:right;display:flex;flex-direction:column;gap:2px;min-width:70px">
        <div style="font-size:13px;font-weight:700" class="${rc2}">${r!==null ? r+'%':'—'} <span style="font-size:10px;font-weight:400;color:var(--hint)">単勝</span></div>
        <div style="font-size:13px;font-weight:700" class="${frc2}">${fr!==null ? fr+'%':'—'} <span style="font-size:10px;font-weight:400;color:var(--hint)">複勝</span></div>
      </div>
    </div>`;
  }).join('');

  return `<div class="group-block">
    <div class="group-header">
      <div>
        <div class="group-header-name">${label}</div>
        <div style="font-size:11px;color:var(--hint);margin-top:1px">${sublabel}　${totN}回　単勝${totWin}回(${wr}%)</div>
      </div>
      <div style="text-align:right">
        <div style="display:flex;gap:10px;align-items:baseline;justify-content:flex-end">
          <div>
            <div class="group-header-roi ${rc}">${roi!==null ? roi+'%':'—'}</div>
            <div class="group-header-sub">単勝回収率</div>
          </div>
          <div>
            <div class="group-header-roi ${frc}">${fukuROI!==null ? fukuROI+'%':'—'}</div>
            <div class="group-header-sub">複勝回収率</div>
          </div>
        </div>
      </div>
    </div>
    ${rows || '<div style="padding:10px 14px;font-size:12px;color:var(--hint)">データなし</div>'}
  </div>`;
}

function renderStats() {
  // --- Overall summary ---
  const st = calcSt();
  const totN    = OSHI.reduce((a,o) => a+st[o.s].n, 0);
  const totHit  = OSHI.reduce((a,o) => a+st[o.s].hit3, 0);
  const totPay  = OSHI.reduce((a,o) => a+st[o.s].tanPay, 0);
  const totFuku = OSHI.reduce((a,o) => a+st[o.s].fukuPay, 0);
  const overallROI  = roiVal(totN, totPay);
  const overallFROI = roiVal(totN, totFuku);

  // 単勝的中率: レース単位
  const totalRaces = recs.length;
  const winRaces = recs.filter(r =>
    (r.horses||[]).some(h => (h.rank||'').trim() !== '除外' && parseInt(h.rank) === 1)
  ).length;
  const winRaceRate = totalRaces > 0 ? Math.round(winRaces / totalRaces * 100) : null;

  document.getElementById('stat-summary').innerHTML = [
    ['登録レース数', recs.length, '登録中'],
    ['単勝的中率',   winRaceRate!==null ? winRaceRate+'%':'—', winRaces+'/'+totalRaces+' レース'],
    ['複勝的中率',   totN>0 ? Math.round(totHit/totN*100)+'%':'—', totHit+'/'+totN+' 回'],
    ['単勝回収率',   overallROI!==null  ? overallROI+'%':'—',  '100円均一'],
    ['複勝回収率',   overallFROI!==null ? overallFROI+'%':'—', '100円均一'],
  ].map(([l,v,s]) => `<div class="stat-card"><div class="lbl">${l}</div><div class="val">${v}</div><div class="sub">${s}</div></div>`).join('');

  // --- Per-oshi (all) ---
  document.getElementById('oshi-stat-list').innerHTML = OSHI.map(o => {
    const s     = st[o.s];
    const roi   = roiVal(s.n, s.tanPay);
    const froi  = roiVal(s.n, s.fukuPay);
    const rc    = roiColor(roi);
    const frc   = roiColor(froi);
    const wr    = s.n > 0 ? Math.round(s.win/s.n*100)  : 0;
    const hr    = s.n > 0 ? Math.round(s.hit3/s.n*100) : 0;
    return `<div class="oshi-stat-row">
      <span class="oshi-chip ${o.cls}" style="width:28px;height:28px;font-size:14px">${o.s}</span>
      <div class="oshi-stat-info">
        <div class="oshi-stat-name">${o.l}</div>
        <div class="oshi-stat-sub">${s.n}回　単勝${s.win}回(${wr}%)　複勝${s.hit3}回(${hr}%)</div>
      </div>
      <div style="text-align:right;display:flex;flex-direction:column;gap:2px">
        <div><span class="roi-val ${rc}" style="font-size:16px;font-weight:700">${roi!==null ? roi+'%':'—'}</span> <span style="font-size:10px;color:var(--hint)">単勝</span></div>
        <div><span class="roi-val ${frc}" style="font-size:16px;font-weight:700">${froi!==null ? froi+'%':'—'}</span> <span style="font-size:10px;color:var(--hint)">複勝</span></div>
      </div>
    </div>`;
  }).join('');

  renderOddsStats();
  renderCourseStats();
  renderUrenFlowOdds();
  renderGradeStats();

  const flowPatterns = [
    { label: '◎ → ○',       partners: ['○'] },
    { label: '◎ → ○▲',     partners: ['○','▲'] },
    { label: '◎ → ○▲△',   partners: ['○','▲','△'] },
    { label: '◎ → ○▲△☆', partners: ['○','▲','△','☆'] },
  ];
  const flowRows = flowPatterns.map(p => {
    const f = calcUrenFlow(p.partners);
    const betPerRace = p.partners.length; // 買い目数（◎→○なら1点、◎→○▲なら2点）
    const roi = f.n > 0 ? Math.round(f.pay / (f.n * betPerRace * 100) * 100) : null;
    const hitRate = f.n > 0 ? Math.round(f.hit / f.n * 100) : 0;
    const rc = roiColor(roi);
    const betLabel = betPerRace + '点買い';
    return `<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:0.5px solid var(--border)">
      <div>
        <div style="font-size:14px;font-weight:700">${p.label}</div>
        <div style="font-size:11px;color:var(--hint);margin-top:2px">${betLabel}　${f.n}R　的中${f.hit}R（${hitRate}%）</div>
      </div>
      <div style="flex:1"></div>
      <div style="text-align:right">
        <div style="font-size:20px;font-weight:700" class="${rc}">${roi!==null ? roi+'%':'—'}</div>
        <div style="font-size:11px;color:var(--hint)">馬連回収率</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('uren-flow-list').innerHTML =
    `<div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:14px">
      <div style="background:var(--surface2);padding:8px 14px;font-size:12px;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)">◎が1着or2着に入り、相手印も1着or2着に入った場合を的中とする</div>
      ${flowRows || '<div style="padding:14px;font-size:13px;color:var(--hint)">データなし</div>'}
    </div>`;
}

// 共通：オッズ帯＋期間フィルターで印別回収率ブロックを生成
function buildOddsStatsBlock(label, subRecs, oddsRange) {
  const RANGES = {
    '1-5':   { label: '1〜5倍',   min: 1,  max: 5  },
    '5-10':  { label: '5〜10倍',  min: 5,  max: 10 },
    '10-20': { label: '10〜20倍', min: 10, max: 20 },
    '20-50': { label: '20〜50倍', min: 20, max: 50 },
    '50-':   { label: '50倍以上', min: 50, max: Infinity },
  };
  const { min, max } = RANGES[oddsRange];
  const oddsLabel = RANGES[oddsRange].label;

  // subRecs 内の馬を対象にオッズ帯で絞って calcSt 相当の処理
  const st = {};
  OSHI.forEach(o => { st[o.s] = { n:0, hit3:0, win:0, tanPay:0, fukuPay:0 }; });
  subRecs.forEach(r => {
    (r.horses||[]).forEach(h => {
      if ((h.rank||'').trim() === '除外') return;
      const o = parseFloat(h.odds);
      if (!(o >= min && o < max)) return;
      const s = st[h.oshi]; if (!s) return;
      const rank = parseInt(h.rank) || 99;
      s.n++;
      if (rank <= 3) { s.hit3++; s.fukuPay += parseFloat(h.fuku) || 0; }
      if (rank === 1) { s.win++; s.tanPay += Math.round(o * 100); }
    });
  });

  const totN = OSHI.reduce((a,o) => a+st[o.s].n, 0);
  if (totN === 0) return `<div style="font-size:13px;color:var(--hint);padding:4px 0">${label}・${oddsLabel} のデータなし</div>`;

  const totPay  = OSHI.reduce((a,o) => a+st[o.s].tanPay, 0);
  const totFuku = OSHI.reduce((a,o) => a+st[o.s].fukuPay, 0);
  const totWin  = OSHI.reduce((a,o) => a+st[o.s].win, 0);
  const roi  = roiVal(totN, totPay);
  const froi = roiVal(totN, totFuku);

  const rows = OSHI.map(o => {
    const s = st[o.s]; if (s.n === 0) return '';
    const r  = roiVal(s.n, s.tanPay);
    const fr = roiVal(s.n, s.fukuPay);
    const wr = s.n > 0 ? Math.round(s.win/s.n*100) : 0;
    const hr = s.n > 0 ? Math.round(s.hit3/s.n*100) : 0;
    return `<div class="oshi-stat-row">
      <span class="oshi-chip ${o.cls}" style="width:26px;height:26px;font-size:13px">${o.s}</span>
      <div class="oshi-stat-info">
        <div class="oshi-stat-name">${o.l}</div>
        <div class="oshi-stat-sub">${s.n}回　単勝${s.win}回(${wr}%)　複勝${s.hit3}回(${hr}%)</div>
      </div>
      <div style="text-align:right;display:flex;flex-direction:column;gap:2px">
        <div><span class="roi-val ${roiColor(r)}" style="font-size:16px;font-weight:700">${r!==null?r+'%':'—'}</span> <span style="font-size:10px;color:var(--hint)">単勝</span></div>
        <div><span class="roi-val ${roiColor(fr)}" style="font-size:16px;font-weight:700">${fr!==null?fr+'%':'—'}</span> <span style="font-size:10px;color:var(--hint)">複勝</span></div>
      </div>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:8px">
      <div>
        <div style="font-size:14px;font-weight:700">${label}　${oddsLabel}</div>
        <div style="font-size:12px;color:var(--hint);margin-top:2px">${totN}頭　単勝${totWin}回</div>
      </div>
      <div style="text-align:right;display:flex;gap:12px">
        <div><div style="font-size:18px;font-weight:700" class="${roiColor(roi)}">${roi!==null?roi+'%':'—'}</div><div style="font-size:11px;color:var(--hint)">単勝回収率</div></div>
        <div><div style="font-size:18px;font-weight:700" class="${roiColor(froi)}">${froi!==null?froi+'%':'—'}</div><div style="font-size:11px;color:var(--hint)">複勝回収率</div></div>
      </div>
    </div>
    <div class="oshi-stat-list">${rows || '<div style="padding:12px 14px;font-size:13px;color:var(--hint)">データなし</div>'}</div>`;
}

function renderUrenFlowOdds() {
  const el = document.getElementById('uren-flow-odds-list');

  const patterns = [
    { label: '◎ → ○',       partners: ['○'] },
    { label: '◎ → ○▲',     partners: ['○','▲'] },
    { label: '◎ → ○▲△',   partners: ['○','▲','△'] },
    { label: '◎ → ○▲△☆', partners: ['○','▲','△','☆'] },
  ];

  // ◎のオッズ条件でフィルタした calcUrenFlow
  function calcFlow(partners, oddsFilter) {
    let n = 0, hit = 0, pay = 0;
    recs.forEach(r => {
      const horses = (r.horses||[]).filter(h => (h.rank||'').trim() !== '除外');
      const hon = horses.find(h => h.oshi === '◎');
      if (!hon) return;
      // ◎のオッズ条件チェック
      const honOdds = parseFloat(hon.odds) || 0;
      if (!oddsFilter(honOdds)) return;
      n++;
      const r1 = horses.filter(h => parseInt(h.rank) === 1);
      const r2 = horses.filter(h => parseInt(h.rank) === 2);
      const honIn = r1.some(h => h.oshi === '◎') || r2.some(h => h.oshi === '◎');
      const partIn = r1.some(h => partners.includes(h.oshi)) || r2.some(h => partners.includes(h.oshi));
      if (honIn && partIn) { hit++; pay += parseFloat(r.uren) || 0; }
    });
    return { n, hit, pay };
  }

  const oddsGroups = [
    { label: '◎ 10倍以下',  filter: o => o > 0 && o <= 10 },
    { label: '◎ 10倍超',    filter: o => o > 10 },
  ];

  // パターンごとに2つのオッズ帯を並べた行を生成
  function flowRow(p, group) {
    const bet = p.partners.length;
    const f = calcFlow(p.partners, group.filter);
    const roi = f.n > 0 ? Math.round(f.pay / (f.n * bet * 100) * 100) : null;
    const hitRate = f.n > 0 ? Math.round(f.hit / f.n * 100) : 0;
    const rc = roiColor(roi);
    return `<div style="flex:1;text-align:center;padding:10px 6px;border-left:0.5px solid var(--border)">
      <div style="font-size:11px;color:var(--hint);margin-bottom:4px">${group.label}</div>
      <div style="font-size:17px;font-weight:700" class="${rc}">${roi!==null?roi+'%':'—'}</div>
      <div style="font-size:11px;color:var(--hint);margin-top:2px">${f.n}R　${hitRate}%的中</div>
    </div>`;
  }

  const rows = patterns.map(p => {
    const bet = p.partners.length;
    return `<div style="border-bottom:0.5px solid var(--border)">
      <div style="padding:10px 14px 6px;font-size:14px;font-weight:700">${p.label} <span style="font-size:11px;color:var(--hint);font-weight:400">${bet}点買い</span></div>
      <div style="display:flex">
        ${oddsGroups.map(g => flowRow(p, g)).join('')}
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `<div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:14px">
    <div style="background:var(--surface2);padding:8px 14px;font-size:12px;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)">◎のオッズ帯別に回収率を比較（オッズ未入力の◎は除外）</div>
    ${rows || '<div style="padding:14px;font-size:13px;color:var(--hint)">データなし</div>'}
  </div>`;
}

  };
  const { label, min, max } = RANGES[range];

function renderSanrenpuku() {
  const el = document.getElementById('sanrenpuku-list');

  // 3連複◎○▲1点：◎○▲の3頭全てが1〜3着に入れば的中
  let n = 0, hit = 0, pay = 0;
  recs.forEach(r => {
    const horses = (r.horses||[]).filter(h => (h.rank||'').trim() !== '除外');
    // ◎○▲全員いるか
    const has = s => horses.some(h => h.oshi === s);
    if (!has('◎') || !has('○') || !has('▲')) return;
    n++;
    // ◎○▲の着順が1,2,3を全て含むか
    const ranks = ['◎','○','▲'].map(s => {
      const h = horses.find(x => x.oshi === s);
      return h ? parseInt(h.rank) : 99;
    });
    const rankSet = new Set(ranks);
    if (rankSet.has(1) && rankSet.has(2) && rankSet.has(3)) {
      hit++;
      pay += parseFloat(r.sanfuku) || 0;
    }
  });

  const hitRate  = n > 0 ? Math.round(hit / n * 100) : null;
  const roi      = n > 0 ? Math.round(pay / (n * 100) * 100) : null;
  const rc       = roiColor(roi);
  const hitColor = hitRate !== null ? (hitRate >= 20 ? 'roi-good' : hitRate >= 10 ? 'roi-mid' : 'roi-bad') : 'roi-none';

  // 月別集計
  const months = [...new Set(recs.map(r => (r.date||'').slice(0,7)).filter(Boolean))].sort((a,b) => b.localeCompare(a));
  const monthRows = months.map(m => {
    let mn = 0, mhit = 0, mpay = 0;
    recs.filter(r => (r.date||'').slice(0,7) === m).forEach(r => {
      const horses = (r.horses||[]).filter(h => (h.rank||'').trim() !== '除外');
      const has = s => horses.some(h => h.oshi === s);
      if (!has('◎') || !has('○') || !has('▲')) return;
      mn++;
      const ranks = ['◎','○','▲'].map(s => { const h = horses.find(x => x.oshi === s); return h ? parseInt(h.rank) : 99; });
      const rs = new Set(ranks);
      if (rs.has(1) && rs.has(2) && rs.has(3)) { mhit++; mpay += parseFloat(r.sanfuku) || 0; }
    });
    if (mn === 0) return '';
    const mroi = roiVal(mn, mpay);
    const mhr  = Math.round(mhit / mn * 100);
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid var(--border)">
      <div style="font-size:14px;font-weight:700;min-width:80px">${m.replace('-','年')}月</div>

        <div style="font-size:11px;color:var(--hint)">回収率</div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div style="font-size:12px;color:var(--hint);margin-bottom:12px">◎○▲の3頭が全て1〜3着に入った場合を的中とする（1点買い100円想定）</div>

function renderSanrenpukuCombo() {
  const el = document.getElementById('sanrenpuku-combo-list');

  // 5印から3つを選ぶ全10組み合わせ C(5,3)=10
  const combos = [];
  for (let i = 0; i < OSHI.length; i++)
    for (let j = i+1; j < OSHI.length; j++)
      for (let k = j+1; k < OSHI.length; k++)
        combos.push([OSHI[i], OSHI[j], OSHI[k]]);

  const results = combos.map(([a, b, c]) => {
    let n = 0, hit = 0, pay = 0;
    recs.forEach(r => {
      const horses = (r.horses||[]).filter(h => (h.rank||'').trim() !== '除外');
      // 3印全員いるか
      if (!horses.some(h => h.oshi === a.s)) return;
      if (!horses.some(h => h.oshi === b.s)) return;
      if (!horses.some(h => h.oshi === c.s)) return;
      n++;
      // 1〜3着をa,b,cの3印が占めているか
      const r1 = horses.filter(h => parseInt(h.rank) === 1);
      const r2 = horses.filter(h => parseInt(h.rank) === 2);
      const r3 = horses.filter(h => parseInt(h.rank) === 3);
      const aIn = r1.some(h=>h.oshi===a.s)||r2.some(h=>h.oshi===a.s)||r3.some(h=>h.oshi===a.s);
      const bIn = r1.some(h=>h.oshi===b.s)||r2.some(h=>h.oshi===b.s)||r3.some(h=>h.oshi===b.s);
      const cIn = r1.some(h=>h.oshi===c.s)||r2.some(h=>h.oshi===c.s)||r3.some(h=>h.oshi===c.s);
      if (aIn && bIn && cIn) { hit++; pay += parseFloat(r.sanfuku) || 0; }
    });
    const hitRate = n > 0 ? Math.round(hit / n * 100) : 0;
    const roi     = n > 0 ? Math.round(pay / (n * 100) * 100) : null;
    return { a, b, c, n, hit, hitRate, roi };
  });

  const byHit = [...results].sort((x,y) => y.hitRate - x.hitRate || (y.roi||0) - (x.roi||0));
  const byRoi = [...results].sort((x,y) => (y.roi||0) - (x.roi||0));

  function comboRow(co, rank) {
    const rc = roiColor(co.roi);
    const hitColor = co.hitRate >= 20 ? 'roi-good' : co.hitRate >= 10 ? 'roi-mid' : 'roi-bad';
    return `<div style="display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:0.5px solid var(--border)">
      <div style="font-size:13px;font-weight:500;color:var(--hint);min-width:20px;text-align:right">${rank}</div>
      <span class="oshi-chip ${co.a.cls}" style="width:24px;height:24px;font-size:12px">${co.a.s}</span>
      <span style="font-size:12px;color:var(--hint)">−</span>
      <span class="oshi-chip ${co.b.cls}" style="width:24px;height:24px;font-size:12px">${co.b.s}</span>
      <span style="font-size:12px;color:var(--hint)">−</span>
      <span class="oshi-chip ${co.c.cls}" style="width:24px;height:24px;font-size:12px">${co.c.s}</span>
      <div style="flex:1;font-size:12px;color:var(--hint)">${co.n}R　的中${co.hit}R</div>
      <div style="display:flex;gap:12px;align-items:baseline">
        <div style="text-align:center">
          <div style="font-size:17px;font-weight:700" class="${hitColor}">${co.n>0?co.hitRate+'%':'—'}</div>
          <div style="font-size:10px;color:var(--hint)">的中率</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:17px;font-weight:700" class="${rc}">${co.roi!==null?co.roi+'%':'—'}</div>
          <div style="font-size:10px;color:var(--hint)">回収率</div>
        </div>
      </div>
    </div>`;
  }

  el.innerHTML = recs.length === 0
    ? ''
    : `
    <div style="font-size:12px;color:var(--hint);margin-bottom:12px">◎〇▲△☆から3印を選んだ1点買いの的中率・回収率（3印全員いるレースのみ集計）</div>

    <div class="stat-section-title">的中率ランキング</div>
    <div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:16px">
      ${byHit.map((c,i) => comboRow(c,i+1)).join('')}
    </div>

    <div class="stat-section-title">回収率ランキング</div>
    <div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:16px">
      ${byRoi.map((c,i) => comboRow(c,i+1)).join('')}
    </div>`;
}

// 馬連2印組み合わせを計算する共通関数
function calcUrenCombos(targetRecs) {
  const combos = [];
  for (let i = 0; i < OSHI.length; i++)
    for (let j = i+1; j < OSHI.length; j++)
      combos.push([OSHI[i], OSHI[j]]);

  return combos.map(([a, b]) => {
    let n = 0, hit = 0, pay = 0;
    targetRecs.forEach(r => {
      const horses = (r.horses||[]).filter(h => (h.rank||'').trim() !== '除外');
      if (!horses.some(h=>h.oshi===a.s) || !horses.some(h=>h.oshi===b.s)) return;
      n++;
      const r1 = horses.filter(h=>parseInt(h.rank)===1);
      const r2 = horses.filter(h=>parseInt(h.rank)===2);
      const aIn = r1.some(h=>h.oshi===a.s)||r2.some(h=>h.oshi===a.s);
      const bIn = r1.some(h=>h.oshi===b.s)||r2.some(h=>h.oshi===b.s);
      if (aIn && bIn) { hit++; pay += parseFloat(r.uren)||0; }
    });
    const hitRate = n>0 ? Math.round(hit/n*100) : 0;
    const roi = n>0 ? Math.round(pay/(n*100)*100) : null;
    return { a, b, n, hit, hitRate, roi };
  });
}

    <div style="flex:1;font-size:12px;color:var(--hint)">${c.n}R　的中${c.hit}R</div>
    <div style="display:flex;gap:14px;align-items:baseline">
      <div style="text-align:center"><div style="font-size:18px;font-weight:700" class="${hitColor}">${c.n>0?c.hitRate+'%':'—'}</div><div style="font-size:10px;color:var(--hint)">的中率</div></div>
      <div style="text-align:center"><div style="font-size:18px;font-weight:700" class="${rc}">${c.roi!==null?c.roi+'%':'—'}</div><div style="font-size:10px;color:var(--hint)">回収率</div></div>
    </div>
  </div>`;
}

function buildUrenComboHTML(results, label) {
  const byHit = [...results].sort((x,y)=>y.hitRate-x.hitRate||(y.roi||0)-(x.roi||0));
  const byRoi = [...results].sort((x,y)=>(y.roi||0)-(x.roi||0));
  return `
    <div style="font-size:12px;color:var(--hint);margin-bottom:12px">${label}</div>
    <div class="stat-section-title">的中率ランキング</div>
    <div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:16px">
      ${byHit.map((c,i)=>urenComboRow(c,i+1)).join('')}
    </div>
    <div class="stat-section-title">回収率ランキング</div>
    <div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:16px">
      ${byRoi.map((c,i)=>urenComboRow(c,i+1)).join('')}
    </div>`;
}

function renderUrenCombo() {
  const el = document.getElementById('uren-combo-list');
  if (!recs.length) { el.innerHTML = '<div class="empty-state">データがありません</div>'; return; }
  const results = calcUrenCombos(recs);
  el.innerHTML = buildUrenComboHTML(results, '◎〇▲△☆から2印を選んだ1点買いの的中率・回収率（両方の印がいるレースのみ集計）');
  renderUrenComboCourse();
}

function renderUrenComboCourse() {
  const el = document.getElementById('uren-combo-course-list');
  const course = (document.getElementById('uren-combo-course')||{}).value || '';
  if (!course) {
    el.innerHTML = '<div style="font-size:13px;color:var(--hint);padding:4px 0">競馬場を選択するとその競馬場の組み合わせランキングを表示します</div>';
    return;
  }
  const courseRecs = recs.filter(r => r.course === course);
  if (!courseRecs.length) {
    el.innerHTML = '<div style="font-size:13px;color:var(--hint);padding:4px 0">この競馬場のデータなし</div>';
    return;
  }
  const results = calcUrenCombos(courseRecs);
  el.innerHTML = buildUrenComboHTML(results, `${course}　${courseRecs.length}R（両方の印がいるレースのみ集計）`);
}
</script>
</body>
</html>
