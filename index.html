
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>競馬予想トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #e0dbd0;
  --text: #1a1713;
  --muted: #6b6560;
  --hint: #9e9890;
  --accent: #c8a84b;
  --win: #2d6a4f;
  --win-bg: #d8f3e8;
  --place: #1a4f8a;
  --place-bg: #dceeff;
  --lose: #8a1a1a;
  --lose-bg: #fde8e8;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; min-height: 100vh; }

.header { background: var(--text); color: white; padding: 14px 16px 12px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; }
.header p { font-size: 11px; color: #aaa; margin-top: 1px; }

.nav { display: flex; background: var(--text); padding: 0 16px 12px; gap: 8px; }
.nav-btn { flex: 1; padding: 10px 0; border-radius: var(--radius-sm); border: none; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.nav-btn.active { background: var(--accent); color: var(--text); }
.nav-btn:not(.active) { background: #2a2520; color: #888; }

.content { padding: 16px; max-width: 640px; margin: 0 auto; }
.section { display: none; }
.section.active { display: block; }

.card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; }
.card-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }

.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; color: var(--muted); font-weight: 500; }
.inp {
  padding: 11px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 16px; color: var(--text); background: var(--surface);
  width: 100%; -webkit-appearance: none; transition: border-color 0.15s;
}
.inp:focus { outline: none; border-color: var(--accent); }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Horse card */
.horse-card {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 12px; margin-bottom: 8px; position: relative;
  border: 1.5px solid transparent; transition: border-color 0.15s, background 0.15s;
}
.horse-card.st-win   { border-color: #b8860b; background: #fdf8e6; }
.horse-card.st-2nd  { border-color: var(--place); background: #f0f6ff; }
.horse-card.st-3rd  { border-color: #2d6a4f; background: #f0faf5; }
.horse-card.st-lose { border-color: #ccc; opacity: 0.65; }

/* row layout inside horse card */
.horse-main { display: grid; grid-template-columns: 110px 1fr 36px; gap: 8px; align-items: center; margin-bottom: 8px; }
.horse-sub  { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: end; }

.hit-badge {
  display: none; position: absolute; top: 8px; right: 44px;
  padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 700;
}
.horse-card.st-win  .hit-badge { display: inline-block; background: #fef3c7; color: #92600a; }
.horse-card.st-2nd  .hit-badge { display: inline-block; background: var(--place-bg); color: var(--place); }
.horse-card.st-3rd  .hit-badge { display: inline-block; background: var(--win-bg); color: var(--win); }
.horse-card.st-lose .hit-badge { display: inline-block; background: #f0f0f0; color: #999; }

.remove-btn { background: none; border: none; font-size: 22px; color: #ccc; cursor: pointer; padding: 0; line-height: 1; touch-action: manipulation; }
.remove-btn:active { color: var(--lose); }

/* Rank input highlight */
.rank-inp { text-align: center; font-weight: 700; }
.rank-inp.rank-1 { border-color: #b8860b !important; background: #fef3c7 !important; color: #92600a !important; }
.rank-inp.rank-2 { border-color: var(--place) !important; background: var(--place-bg) !important; color: var(--place) !important; }
.rank-inp.rank-3 { border-color: var(--win) !important; background: var(--win-bg) !important; color: var(--win) !important; }
.rank-inp.rank-out { border-color: #ccc !important; background: #f5f5f5 !important; color: #999 !important; }

/* Buttons */
.btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 14px 20px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); font-family: inherit; font-size: 15px; font-weight: 500; cursor: pointer; touch-action: manipulation; transition: all 0.15s; }
.btn-primary { background: var(--text); color: white; border-color: var(--text); }
.btn-secondary { background: var(--surface); color: var(--text); }
.btn-danger { color: var(--lose); border-color: #fdd; background: var(--surface); }
.btn-small { padding: 8px 14px; font-size: 13px; }
.btn-add { background: var(--surface2); border: 1.5px dashed var(--border); color: var(--muted); width: 100%; margin-top: 4px; }
.btn-row { display: flex; gap: 10px; margin-top: 4px; }
.btn-row .btn-primary { flex: 1; }

.msg { font-size: 13px; color: var(--muted); padding: 6px 0; min-height: 24px; }
.msg.success { color: var(--win); }
.msg.error { color: var(--lose); }

/* History */
.hist-item { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 14px 10px; margin-bottom: 10px; }
.hist-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.hist-race { font-size: 15px; font-weight: 700; }
.hist-meta { font-size: 11px; color: var(--hint); margin-top: 2px; }
.hist-actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: 8px; }
.hist-horses { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
.hist-horse { display: flex; align-items: center; gap: 8px; font-size: 14px; }
.hist-horse .odds-txt { font-size: 12px; color: var(--hint); }
.hist-horse .rank-txt { font-size: 12px; color: var(--hint); margin-left: auto; margin-right: 4px; }
.oshi-chip { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.oshi-hon { background: #dbe8ff; color: #1a4f8a; }
.oshi-tai { background: #ffe8d6; color: #8a4a00; }
.oshi-tan { background: #dffde8; color: #1a6b3a; }
.oshi-ren { background: #fdf8d6; color: #7a6800; }
.oshi-ana { background: #fde8f5; color: #8a1a6a; }
.hit-chip { padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.chip-1st   { background: #fef3c7; color: #92600a; }
.chip-2nd   { background: var(--place-bg); color: var(--place); }
.chip-3rd   { background: var(--win-bg);   color: var(--win);   }
.chip-lose  { background: #f0f0f0; color: #999; }
.hist-summary { font-size: 12px; color: var(--muted); background: var(--surface2); border-radius: 6px; padding: 6px 10px; }
.no-result { font-size: 12px; color: var(--hint); }

/* Stats */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px; }
.stat-card .lbl { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 0.05em; margin-bottom: 4px; }
.stat-card .val { font-size: 26px; font-weight: 700; color: var(--text); }
.stat-card .sub { font-size: 11px; color: var(--hint); margin-top: 2px; }
.oshi-stat-list { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px; }
.oshi-stat-row { display: flex; align-items: center; gap: 12px; padding: 14px; border-bottom: 1px solid var(--border); }
.oshi-stat-row:last-child { border-bottom: none; }
.oshi-stat-info { flex: 1; }
.oshi-stat-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.oshi-stat-sub { font-size: 12px; color: var(--hint); }
.oshi-roi { text-align: right; }
.oshi-roi .roi-val { font-size: 22px; font-weight: 700; }
.oshi-roi .roi-lbl { font-size: 11px; color: var(--hint); }
.roi-good { color: #c0392b; }
.roi-mid  { color: #8a6c00; }
.roi-bad  { color: #1a4f8a; }
.roi-none { color: var(--hint); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--hint); font-size: 14px; }

/* Stats section headers */
.stat-section-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin: 18px 0 8px; }

/* Grouped oshi table: used by both lowodds and course sections */
.group-block { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px; }
.group-header { background: var(--surface2); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.group-header-name { font-size: 14px; font-weight: 700; }
.group-header-roi { font-size: 16px; font-weight: 700; }
.group-header-sub { font-size: 11px; color: var(--hint); margin-top: 1px; text-align: right; }
.group-oshi-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.group-oshi-row:last-child { border-bottom: none; }
.group-oshi-info { flex: 1; font-size: 12px; color: var(--hint); }
.group-oshi-roi { text-align: right; font-size: 15px; font-weight: 700; min-width: 52px; }

/* Sort buttons */
.sort-btn { padding: 6px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; background: var(--surface); color: var(--muted); touch-action: manipulation; transition: all 0.15s; }
.sort-btn.active { background: var(--text); color: white; border-color: var(--text); }

/* Group header for sorted sections */
.hist-group-header { font-size: 13px; font-weight: 700; color: var(--muted); padding: 6px 4px 8px; margin-top: 12px; border-bottom: 1.5px solid var(--border); margin-bottom: 8px; letter-spacing: 0.04em; }
.hist-group-header:first-child { margin-top: 0; }
</style>
</head>
<body>

<div class="header">
  <h1>🏇 競馬予想トラッカー</h1>
  <p>AI予想の印別 的中率・回収率を集計</p>
</div>
<div class="nav">
  <button class="nav-btn active" onclick="showTab('input',this)">予想入力</button>
  <button class="nav-btn" onclick="showTab('history',this)">履歴</button>
  <button class="nav-btn" onclick="showTab('stats',this)">集計</button>
</div>

<div class="content">

  <!-- INPUT TAB -->
  <div id="tab-input" class="section active">

    <div id="edit-banner" style="display:none;background:#fff8e6;border:1px solid #e8d090;border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;font-size:13px;color:#7a5c00;">
      ✏️ 編集中: <span id="edit-race-name"></span>
    </div>

    <div class="card">
      <div class="card-title">レース情報</div>
      <div class="grid2" style="margin-bottom:10px">
        <div class="field"><label>日付</label><input type="date" id="f-date" class="inp"></div>
        <div class="field"><label>競馬場</label>
          <select id="f-course" class="inp">
            <option value="">選択</option>
            <optgroup label="中央">
              <option value="札幌">札幌</option>
              <option value="函館">函館</option>
              <option value="福島">福島</option>
              <option value="新潟">新潟</option>
              <option value="東京">東京</option>
              <option value="中山">中山</option>
              <option value="中京">中京</option>
              <option value="京都">京都</option>
              <option value="阪神">阪神</option>
              <option value="小倉">小倉</option>
            </optgroup>
            <optgroup label="その他">
              <option value="地方">地方</option>
              <option value="海外">海外</option>
            </optgroup>
          </select>
        </div>
      </div>
      <div class="grid2" style="margin-bottom:10px">
        <div class="field"><label>グレード</label>
          <select id="f-grade" class="inp">
            <option value="">選択</option>
            <option value="G1">G1</option>
            <option value="G2">G2</option>
            <option value="G3">G3</option>
            <option value="OP">OP</option>
            <option value="L">L</option>
            <option value="3勝">3勝</option>
            <option value="2勝">2勝</option>
            <option value="1勝">1勝</option>
            <option value="未勝利">未勝利</option>
            <option value="新馬">新馬</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="field"><label>レース番号</label>
          <select id="f-rno" class="inp">
            <option value="">選択</option>
            <option value="1R">1R</option>
            <option value="2R">2R</option>
            <option value="3R">3R</option>
            <option value="4R">4R</option>
            <option value="5R">5R</option>
            <option value="6R">6R</option>
            <option value="7R">7R</option>
            <option value="8R">8R</option>
            <option value="9R">9R</option>
            <option value="10R">10R</option>
            <option value="11R">11R</option>
            <option value="12R">12R</option>
          </select>
        </div>
      </div>
      <div class="field"><label>レース名</label><input type="text" id="f-race" placeholder="スプリングS" class="inp"></div>
    </div>

    <div class="card">
      <div class="card-title">
        印・馬情報
        <span style="font-size:11px;color:var(--hint);text-transform:none;letter-spacing:0;font-weight:400"> — 着順入力で自動判定</span>
      </div>
      <div id="horse-list"></div>
      <button class="btn btn-add" onclick="addHorse()">＋ 馬を追加</button>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveRecord()">💾 保存する</button>
      <button class="btn btn-secondary" onclick="clearForm()">クリア</button>
    </div>
    <div class="msg" id="save-msg"></div>
  </div>

  <!-- HISTORY TAB -->
  <div id="tab-history" class="section">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center">
      <span style="font-size:12px;color:var(--muted);font-weight:500">ソート：</span>
      <button class="sort-btn active" onclick="setSort('date')">日付順</button>
      <button class="sort-btn" onclick="setSort('course')">競馬場別</button>
      <button class="sort-btn" onclick="setSort('month')">月別</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
      <input type="date" id="hist-date-filter" class="inp" style="flex:1;font-size:15px;padding:9px 12px" oninput="renderHistory()">
      <button class="sort-btn" onclick="document.getElementById('hist-date-filter').value='';renderHistory()" style="white-space:nowrap;flex-shrink:0">全表示</button>
    </div>
    <div id="hist-list"></div>
  </div>

  <!-- STATS TAB -->
  <div id="tab-stats" class="section">
    <div class="stat-grid" id="stat-summary"></div>

    <div class="stat-section-title">印別 集計</div>
    <div class="oshi-stat-list" id="oshi-stat-list"></div>

    <div class="stat-section-title">オッズ10倍以下 限定集計（印別）</div>
    <div id="lowodds-list"></div>

    <div class="stat-section-title">競馬場別 単勝回収率（印別）</div>
    <div id="course-stat-list"></div>

    <div class="stat-section-title">グレード別 回収率（印別）</div>
    <div id="grade-stat-list"></div>
  </div>

</div>

<script>
const OSHI = [
  { s:'◎', l:'◎ 本命', cls:'oshi-hon', color:'#1a4f8a' },
  { s:'○', l:'○ 対抗', cls:'oshi-tai', color:'#8a4a00' },
  { s:'▲', l:'▲ 単穴', cls:'oshi-tan', color:'#1a6b3a' },
  { s:'△', l:'△ 連下', cls:'oshi-ren', color:'#7a6800' },
  { s:'☆', l:'☆ 穴',  cls:'oshi-ana', color:'#8a1a6a' },
];

let recs = [];
let editId = null;

try { recs = JSON.parse(localStorage.getItem('kb5') || '[]'); } catch(e) {}
function persist() { try { localStorage.setItem('kb5', JSON.stringify(recs)); } catch(e) {} }

window.onload = function() {
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  OSHI.forEach(o => addHorse(o.s));
};

function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'history') renderHistory();
  if (id === 'stats') renderStats();
}

// ---- HORSE CARD ----
function addHorse(defaultOshi, data) {
  data = data || {};
  const wrap = document.getElementById('horse-list');
  const div = document.createElement('div');
  div.className = 'horse-card';
  div.innerHTML = `
    <span class="hit-badge"></span>
    <div class="horse-main">
      <select class="oshi-select inp" style="font-weight:700;font-size:15px;padding:11px 8px"
              onchange="judgeCard(this.closest('.horse-card'))">
        ${OSHI.map(o => `<option value="${o.s}"${(data.oshi||defaultOshi)===o.s?' selected':''}>${o.l}</option>`).join('')}
      </select>
      <input type="text" placeholder="馬名" class="horse-name inp"
             value="${data.name||''}" oninput="judgeCard(this.closest('.horse-card'))">
      <button class="remove-btn" onclick="this.closest('.horse-card').remove()">×</button>
    </div>
    <div class="horse-sub" style="grid-template-columns:1fr 1fr 1fr">
      <div class="field">
        <label>オッズ（倍）</label>
        <input type="text" placeholder="2.1"
               class="horse-odds inp" value="${data.odds||''}"
               oninput="judgeCard(this.closest('.horse-card'))">
      </div>
      <div class="field">
        <label>複勝配当（円）</label>
        <input type="text" placeholder="150"
               class="horse-fuku inp" value="${data.fuku||''}">
      </div>
      <div class="field">
        <label>着順</label>
        <input type="text" placeholder="—"
               class="horse-rank inp rank-inp" value="${data.rank||''}"
               oninput="judgeCard(this.closest('.horse-card'))">
      </div>
    </div>`;
  wrap.appendChild(div);
  // apply saved rank color if editing
  if (data.rank) judgeCard(div);
}

function judgeCard(card) {
  const rankInp = card.querySelector('.horse-rank');
  const rank = parseInt(rankInp.value);
  const badge = card.querySelector('.hit-badge');

  // Rank input coloring
  rankInp.classList.remove('rank-1', 'rank-2', 'rank-3', 'rank-out');
  if      (rank === 1)                   rankInp.classList.add('rank-1');
  else if (rank === 2)                   rankInp.classList.add('rank-2');
  else if (rank === 3)                   rankInp.classList.add('rank-3');
  else if (rankInp.value)                rankInp.classList.add('rank-out');

  // Card state
  card.classList.remove('st-win', 'st-2nd', 'st-3rd', 'st-lose');
  badge.textContent = '';

  if (!rankInp.value) return;

  if (rank === 1) {
    card.classList.add('st-win');
    const odds = parseFloat(card.querySelector('.horse-odds').value) || 0;
    const fuku = parseFloat(card.querySelector('.horse-fuku').value) || 0;
    badge.textContent = '1着 🥇' + (odds ? '  ＋' + Math.round(odds * 100) + '円' : '') + (fuku ? '  複勝＋' + fuku + '円' : '');
  } else if (rank === 2) {
    card.classList.add('st-2nd');
    const fuku = parseFloat(card.querySelector('.horse-fuku').value) || 0;
    badge.textContent = '2着 🥈' + (fuku ? '  複勝＋' + fuku + '円' : '');
  } else if (rank === 3) {
    card.classList.add('st-3rd');
    const fuku = parseFloat(card.querySelector('.horse-fuku').value) || 0;
    badge.textContent = '3着 🥉' + (fuku ? '  複勝＋' + fuku + '円' : '');
  } else {
    card.classList.add('st-lose');
    badge.textContent = rank + '着';
  }
}

function getHorses() {
  return Array.from(document.querySelectorAll('.horse-card')).map(card => ({
    oshi:  card.querySelector('.oshi-select').value,
    name:  card.querySelector('.horse-name').value.trim(),
    odds:  card.querySelector('.horse-odds').value,
    fuku:  card.querySelector('.horse-fuku').value,
    rank:  card.querySelector('.horse-rank').value,
  })).filter(h => h.name);
}

// ---- SAVE ----
function saveRecord() {
  const race = document.getElementById('f-race').value.trim();
  if (!race) { showMsg('レース名を入力してください', 'error'); return; }
  const horses = getHorses();
  if (!horses.length) { showMsg('馬情報を入力してください', 'error'); return; }
  const rec = {
    id: editId || Date.now(),
    date: document.getElementById('f-date').value,
    course: document.getElementById('f-course').value,
    grade: document.getElementById('f-grade').value,
    rno: document.getElementById('f-rno').value,
    race,
    horses,
  };
  if (editId) { recs = recs.map(r => r.id === editId ? rec : r); }
  else { recs.unshift(rec); }
  persist();
  editId = null;
  document.getElementById('edit-banner').style.display = 'none';
  showMsg('✓ 保存しました（' + race + '）', 'success');
}

function clearForm() {
  document.getElementById('horse-list').innerHTML = '';
  OSHI.forEach(o => addHorse(o.s));
  document.getElementById('edit-banner').style.display = 'none';
  editId = null;
  showMsg('');
}

function showMsg(txt, type) {
  const el = document.getElementById('save-msg');
  el.textContent = txt;
  el.className = 'msg' + (type ? ' '+type : '');
}

// ---- HISTORY ----
let histSort = 'date';

function setSort(mode) {
  histSort = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('hist-list');
  const filterDate = (document.getElementById('hist-date-filter')||{}).value || '';
  const filtered = filterDate ? recs.filter(r => r.date === filterDate) : recs;
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state">' + (filterDate ? 'この日付のデータはありません' : 'まだデータがありません') + '</div>';
    return;
  }

  function recCard(r) {
    const horsesHtml = (r.horses||[]).map(h => {
      const o = OSHI.find(x => x.s === h.oshi) || OSHI[0];
      const rank = parseInt(h.rank);
      const rankTxt = (h.rank || '').trim();
      let chipClass = '', chipTxt = '';
      if (rankTxt === '除外') { chipClass = 'chip-lose'; chipTxt = '除外'; }
      else if (rankTxt) {
        if (rank === 1)      { chipClass = 'chip-1st';  chipTxt = '1着'; }
        else if (rank === 2) { chipClass = 'chip-2nd';  chipTxt = '2着'; }
        else if (rank === 3) { chipClass = 'chip-3rd';  chipTxt = '3着'; }
        else                 { chipClass = 'chip-lose'; chipTxt = rank+'着'; }
      }
      const pay = (rank === 1 && h.odds) ? '+' + Math.round(parseFloat(h.odds)*100) + '円' : '';
      return `<div class="hist-horse">
        <span class="oshi-chip ${o.cls}">${h.oshi}</span>
        <span>${h.name}</span>
        ${h.odds ? `<span class="odds-txt">${h.odds}倍</span>` : ''}
        <span class="rank-txt" style="margin-left:auto"></span>
        ${chipClass ? `<span class="hit-chip ${chipClass}">${chipTxt}</span>` : ''}
        ${pay ? `<span style="font-size:12px;color:#c0392b;font-weight:700;margin-left:4px">${pay}</span>` : ''}
      </div>`;
    }).join('');
    const hasResult = (r.horses||[]).some(h => h.rank);
    const winHorse = (r.horses||[]).find(h => parseInt(h.rank)===1);
    const summaryTxt = hasResult
      ? (winHorse ? `1着: ${winHorse.name}${winHorse.odds ? '（'+winHorse.odds+'倍）' : ''}` : '結果入力あり（1着なし）')
      : null;
    return `<div class="hist-item">
      <div class="hist-head"><div>
        <div class="hist-race">${r.race}</div>
        <div class="hist-meta">${[r.date, r.course, r.grade, r.rno].filter(Boolean).join(' ')}</div>
      </div>
      <div class="hist-actions">
        <button class="btn btn-secondary btn-small" onclick="editRec(${r.id})">編集</button>
        <button class="btn btn-danger btn-small" onclick="deleteRec(${r.id});renderHistory()">削除</button>
      </div></div>
      <div class="hist-horses">${horsesHtml}</div>
      ${summaryTxt ? `<div class="hist-summary">${summaryTxt}</div>` : `<div class="no-result">着順未入力</div>`}
    </div>`;
  }

  if (histSort === 'date') {
    el.innerHTML = filtered.map(recCard).join('');

  } else if (histSort === 'course') {
    const COURSE_ORDER = ['札幌','函館','福島','新潟','東京','中山','中京','京都','阪神','小倉','地方','海外'];
    const groups = {};
    filtered.forEach(r => {
      const key = (r.course || '').trim() || '未設定';
      if (!groups[key]) groups[key] = [];
      groups[key].push(r);
    });
    const keys = Object.keys(groups).sort((a, b) => {
      const ai = COURSE_ORDER.indexOf(a), bi = COURSE_ORDER.indexOf(b);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    el.innerHTML = keys.map(key =>
      `<div class="hist-group-header">🏟 ${key}（${groups[key].length}件）</div>` +
      groups[key].map(recCard).join('')
    ).join('');

  } else if (histSort === 'month') {
    const groups = {};
    filtered.forEach(r => {
      const key = r.date ? r.date.slice(0, 7) : '日付未設定';
      if (!groups[key]) groups[key] = [];
      groups[key].push(r);
    });
    const keys = Object.keys(groups).sort((a, b) => b.localeCompare(a));
    el.innerHTML = keys.map(key => {
      const label = key.length === 7 ? key.replace('-', '年') + '月' : key;
      return `<div class="hist-group-header">📅 ${label}（${groups[key].length}件）</div>` +
        groups[key].map(recCard).join('');
    }).join('');
  }
}

function editRec(id) {
  const r = recs.find(x => x.id === id);
  if (!r) return;
  editId = id;
  document.getElementById('f-date').value = r.date || '';
  document.getElementById('f-course').value = r.course || '';
  document.getElementById('f-grade').value = r.grade || '';
  document.getElementById('f-rno').value = r.rno || '';
  document.getElementById('f-race').value = r.race || '';
  document.getElementById('horse-list').innerHTML = '';
  (r.horses||[]).forEach(h => addHorse(h.oshi, h));
  document.getElementById('edit-banner').style.display = 'block';
  document.getElementById('edit-race-name').textContent = r.race;
  // switch to input tab
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-input').classList.add('active');
  document.querySelectorAll('.nav-btn')[0].classList.add('active');
  showMsg('編集中: ' + r.race);
  window.scrollTo(0,0);
}

function deleteRec(id) {
  if (!confirm('削除しますか？')) return;
  recs = recs.filter(r => r.id !== id);
  persist();
  renderHistory();
}

// ---- STATS ----
function calcSt(filter) {
  const st = {};
  OSHI.forEach(o => { st[o.s] = { n:0, hit3:0, win:0, tanPay:0, fukuPay:0 }; });
  recs.forEach(r => {
    (r.horses||[]).forEach(h => {
      if (filter && !filter(h, r)) return;
      const s = st[h.oshi]; if (!s) return;
      if ((h.rank || '').trim() === '除外') return;
      const rank = parseInt(h.rank) || 99;
      s.n++;
      if (rank <= 3) {
        s.hit3++;
        s.fukuPay += parseFloat(h.fuku) || 0;
      }
      if (rank === 1) { s.win++; s.tanPay += Math.round((parseFloat(h.odds)||0) * 100); }
    });
  });
  return st;
}

function roiColor(roi) {
  return roi === null ? 'roi-none' : roi >= 100 ? 'roi-good' : roi >= 50 ? 'roi-mid' : 'roi-bad';
}
function roiVal(n, pay) {
  return n > 0 ? Math.round(pay / (n * 100) * 100) : null;
}

// Build a group-block card with a header (total ROI) + per-oshi rows
function buildGroupBlock(label, sublabel, st) {
  const totN    = OSHI.reduce((a,o) => a+st[o.s].n, 0);
  const totWin  = OSHI.reduce((a,o) => a+st[o.s].win, 0);
  const totPay  = OSHI.reduce((a,o) => a+st[o.s].tanPay, 0);
  const totFuku = OSHI.reduce((a,o) => a+st[o.s].fukuPay, 0);
  const roi     = roiVal(totN, totPay);
  const fukuROI = roiVal(totN, totFuku);
  const rc      = roiColor(roi);
  const frc     = roiColor(fukuROI);
  const wr      = totN > 0 ? Math.round(totWin/totN*100) : 0;

  const rows = OSHI.map(o => {
    const s = st[o.s];
    if (s.n === 0) return '';
    const r   = roiVal(s.n, s.tanPay);
    const fr  = roiVal(s.n, s.fukuPay);
    const rc2 = roiColor(r);
    const frc2= roiColor(fr);
    const w   = s.n > 0 ? Math.round(s.win/s.n*100) : 0;
    const h2  = s.n > 0 ? Math.round(s.hit3/s.n*100) : 0;
    return `<div class="group-oshi-row">
      <span class="oshi-chip ${o.cls}">${o.s}</span>
      <div class="group-oshi-info">${s.n}回　単勝${s.win}回(${w}%)　複勝${s.hit3}回(${h2}%)</div>
      <div style="text-align:right;display:flex;flex-direction:column;gap:2px;min-width:70px">
        <div style="font-size:13px;font-weight:700" class="${rc2}">${r!==null ? r+'%':'—'} <span style="font-size:10px;font-weight:400;color:var(--hint)">単勝</span></div>
        <div style="font-size:13px;font-weight:700" class="${frc2}">${fr!==null ? fr+'%':'—'} <span style="font-size:10px;font-weight:400;color:var(--hint)">複勝</span></div>
      </div>
    </div>`;
  }).join('');

  return `<div class="group-block">
    <div class="group-header">
      <div>
        <div class="group-header-name">${label}</div>
        <div style="font-size:11px;color:var(--hint);margin-top:1px">${sublabel}　${totN}回　単勝${totWin}回(${wr}%)</div>
      </div>
      <div style="text-align:right">
        <div style="display:flex;gap:10px;align-items:baseline;justify-content:flex-end">
          <div>
            <div class="group-header-roi ${rc}">${roi!==null ? roi+'%':'—'}</div>
            <div class="group-header-sub">単勝回収率</div>
          </div>
          <div>
            <div class="group-header-roi ${frc}">${fukuROI!==null ? fukuROI+'%':'—'}</div>
            <div class="group-header-sub">複勝回収率</div>
          </div>
        </div>
      </div>
    </div>
    ${rows || '<div style="padding:10px 14px;font-size:12px;color:var(--hint)">データなし</div>'}
  </div>`;
}

function renderStats() {
  // --- Overall summary ---
  const st = calcSt();
  const totN    = OSHI.reduce((a,o) => a+st[o.s].n, 0);
  const totHit  = OSHI.reduce((a,o) => a+st[o.s].hit3, 0);
  const totPay  = OSHI.reduce((a,o) => a+st[o.s].tanPay, 0);
  const totFuku = OSHI.reduce((a,o) => a+st[o.s].fukuPay, 0);
  const overallROI  = roiVal(totN, totPay);
  const overallFROI = roiVal(totN, totFuku);

  // 単勝的中率: レース単位（そのレースで1着の馬が1頭でもあれば的中）
  const totalRaces = recs.length;
  const winRaces = recs.filter(r =>
    (r.horses||[]).some(h => (h.rank||'').trim() !== '除外' && parseInt(h.rank) === 1)
  ).length;
  const winRaceRate = totalRaces > 0 ? Math.round(winRaces / totalRaces * 100) : null;

  document.getElementById('stat-summary').innerHTML = [
    ['登録レース数', recs.length, '登録中'],
    ['単勝的中率',   winRaceRate!==null ? winRaceRate+'%':'—', winRaces+'/'+totalRaces+' レース'],
    ['複勝的中率',   totN>0 ? Math.round(totHit/totN*100)+'%':'—', totHit+'/'+totN+' 回'],
    ['単勝回収率',   overallROI!==null  ? overallROI+'%':'—',  '100円均一'],
    ['複勝回収率',   overallFROI!==null ? overallFROI+'%':'—', '100円均一'],
  ].map(([l,v,s]) => `<div class="stat-card"><div class="lbl">${l}</div><div class="val">${v}</div><div class="sub">${s}</div></div>`).join('');

  // --- Per-oshi (all) ---
  document.getElementById('oshi-stat-list').innerHTML = OSHI.map(o => {
    const s     = st[o.s];
    const roi   = roiVal(s.n, s.tanPay);
    const froi  = roiVal(s.n, s.fukuPay);
    const rc    = roiColor(roi);
    const frc   = roiColor(froi);
    const wr    = s.n > 0 ? Math.round(s.win/s.n*100)  : 0;
    const hr    = s.n > 0 ? Math.round(s.hit3/s.n*100) : 0;
    return `<div class="oshi-stat-row">
      <span class="oshi-chip ${o.cls}" style="width:28px;height:28px;font-size:14px">${o.s}</span>
      <div class="oshi-stat-info">
        <div class="oshi-stat-name">${o.l}</div>
        <div class="oshi-stat-sub">${s.n}回　単勝${s.win}回(${wr}%)　複勝${s.hit3}回(${hr}%)</div>
      </div>
      <div style="text-align:right;display:flex;flex-direction:column;gap:2px">
        <div><span class="oshi-roi" style="display:inline"><span class="roi-val ${rc}" style="font-size:18px">${roi!==null ? roi+'%':'—'}</span></span> <span style="font-size:10px;color:var(--hint)">単勝</span></div>
        <div><span class="oshi-roi" style="display:inline"><span class="roi-val ${frc}" style="font-size:18px">${froi!==null ? froi+'%':'—'}</span></span> <span style="font-size:10px;color:var(--hint)">複勝</span></div>
      </div>
    </div>`;
  }).join('');

  // --- Low odds (≤10倍) 全印合計のみ ---
  const stLow = calcSt(h => parseFloat(h.odds) > 0 && parseFloat(h.odds) <= 10);
  const loTotal = OSHI.reduce((a,o) => a+stLow[o.s].n, 0);
  document.getElementById('lowodds-list').innerHTML = loTotal === 0
    ? '<div class="group-block"><div style="padding:16px 14px;font-size:13px;color:var(--hint)">オッズ10倍以下のデータなし</div></div>'
    : buildGroupBlock('全印 合計', 'オッズ10倍以下', stLow);

  // --- Per-course per-oshi ---
  const GRADE_ORDER = ['G1','G2','G3','OP','L','3勝','2勝','1勝','未勝利','新馬','その他'];
  const courses = [...new Set(recs.map(r => (r.course||'').trim() || '不明'))];
  courses.sort((a,b) => {
    const na = recs.filter(r=>((r.course||'').trim()||'不明')===a).reduce((s,r)=>(r.horses||[]).filter(h=>h.rank).length+s,0);
    const nb = recs.filter(r=>((r.course||'').trim()||'不明')===b).reduce((s,r)=>(r.horses||[]).filter(h=>h.rank).length+s,0);
    return nb - na;
  });
  document.getElementById('course-stat-list').innerHTML = courses.length === 0
    ? '<div class="group-block"><div style="padding:16px 14px;font-size:13px;color:var(--hint)">競馬場データなし</div></div>'
    : courses.map(course => {
        const stC = calcSt((h, r) => ((r.course||'').trim()||'不明') === course);
        const total = OSHI.reduce((a,o) => a+stC[o.s].n, 0);
        if (total === 0) return '';
        return buildGroupBlock(course, '競馬場', stC);
      }).join('');

  // --- Per-grade per-oshi ---
  const grades = [...new Set(recs.map(r => (r.grade||'').trim() || 'その他'))];
  grades.sort((a,b) => {
    const ai = GRADE_ORDER.indexOf(a); const bi = GRADE_ORDER.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  document.getElementById('grade-stat-list').innerHTML = grades.length === 0
    ? '<div class="group-block"><div style="padding:16px 14px;font-size:13px;color:var(--hint)">グレードデータなし</div></div>'
    : grades.map(grade => {
        const stG = calcSt((h, r) => ((r.grade||'').trim()||'その他') === grade);
        const total = OSHI.reduce((a,o) => a+stG[o.s].n, 0);
        if (total === 0) return '';
        return buildGroupBlock(grade, 'グレード', stG);
      }).join('');
}
</script>
